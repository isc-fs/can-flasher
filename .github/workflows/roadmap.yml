name: Render ROADMAP

# Regenerates ROADMAP.md from .github/roadmap.yaml + GitHub issue state.
#
# Triggers on every push to `dev` (which also covers merges of feat/fix
# PRs, since those all target `dev`) and a manual workflow_dispatch. The
# autocommit it creates uses GITHUB_TOKEN, which per GitHub's rules does
# not recursively trigger this workflow — so no infinite loop.

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues:   read
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet pyyaml

      - name: Render ROADMAP.md
        env:
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python3 .github/scripts/render_roadmap.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- ROADMAP.md; then
            echo "ROADMAP.md is up-to-date; no commit needed."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ROADMAP.md
          git commit -m "chore: regenerate ROADMAP.md [skip ci]"
          git push origin HEAD:dev
