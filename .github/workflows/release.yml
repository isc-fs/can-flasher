name: Release

# Unified release pipeline for **all three** product surfaces:
#
#   - `can-flasher` CLI — built on all four targets as a compile
#     gate, but NOT attached to the Release (install via `cargo
#     install --git … --tag …`; operators wanted installer packages
#     only, not raw binary tarballs).
#   - VS Code extension (.vsix)
#   - ISC CAN Studio (Tauri desktop installers — .dmg / .deb / .rpm /
#     .AppImage / .exe (NSIS); .msi excluded. AppImage is back so the
#     in-app auto-updater can self-update on Linux, and updater `.sig`
#     bundles + a `latest.json` manifest ship alongside — see
#     docs/UPDATES.md)
#
# A single `v*` tag (e.g. `v2.0.0`) triggers all three surfaces to
# build in parallel and attach their artefacts to one GitHub
# Release. Per-surface tag namespaces (`editor-v*`, `can-studio-v*`)
# are retired — see `docs/CONTRIBUTING.md § Cutting a release`.
#
# Trigger semantics:
#
#   push tags: 'v*'    → tag push, attaches to GitHub Release
#   workflow_dispatch  → manual dry-run; artefacts only, no Release
#
# Why one workflow instead of three workflows attaching to one
# release: race conditions on concurrent release-create from
# multiple workflows are nasty (only one wins, the others
# silently skip files), and a single workflow makes "did the
# release succeed?" a single gate with three parallel legs.
#
# Versioning policy: every surface ships at the SAME version in
# lockstep. The `verify-version` gate enforces that all five
# source files (root Cargo.toml + editor/vscode/package.json +
# the three apps/can-studio version-of-truth files) agree with
# the pushed tag before any build runs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ---- Gate ---------------------------------------------------
  #
  # Every source-of-truth version file MUST agree with the pushed
  # tag. Catches the classic "tag v2.0.0 pushed but Cargo.toml
  # still reads 1.3.1" mistake before any artefact is produced.
  #
  # Skipped on manual dispatch (nothing to compare against).

  verify-version:
    name: verify tag matches all source versions
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions across all surfaces
        run: |
          set -eu
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          CLI_CARGO=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          EDITOR_PKG=$(node -p "require('./editor/vscode/package.json').version")
          STUDIO_CARGO=$(awk -F'"' '/^version/ {print $2; exit}' apps/can-studio/src-tauri/Cargo.toml)
          STUDIO_PKG=$(node -p "require('./apps/can-studio/package.json').version")
          STUDIO_TAURI=$(node -p "require('./apps/can-studio/src-tauri/tauri.conf.json').version")

          mismatches=""
          [[ "$TAG_VERSION" == "$CLI_CARGO"   ]] || mismatches+=" Cargo.toml=$CLI_CARGO"
          [[ "$TAG_VERSION" == "$EDITOR_PKG"  ]] || mismatches+=" editor/vscode/package.json=$EDITOR_PKG"
          [[ "$TAG_VERSION" == "$STUDIO_CARGO" ]] || mismatches+=" apps/can-studio/src-tauri/Cargo.toml=$STUDIO_CARGO"
          [[ "$TAG_VERSION" == "$STUDIO_PKG"  ]] || mismatches+=" apps/can-studio/package.json=$STUDIO_PKG"
          [[ "$TAG_VERSION" == "$STUDIO_TAURI" ]] || mismatches+=" apps/can-studio/src-tauri/tauri.conf.json=$STUDIO_TAURI"

          if [[ -n "$mismatches" ]]; then
            echo "::error::tag $GITHUB_REF_NAME implies version $TAG_VERSION, but source files disagree:$mismatches"
            echo "::error::Bump all five files to $TAG_VERSION in lockstep and retag (or delete the tag and re-cut)."
            exit 1
          fi
          echo "✓ all five source files agree on version $TAG_VERSION"

  # ---- Release page -------------------------------------------
  #
  # Creates the GitHub Release with the unified notes BEFORE any
  # build job attaches artefacts. Avoids the race condition that
  # would otherwise happen if three build jobs all tried to create
  # the same release from parallel runners.
  #
  # The body intentionally points at the in-repo release notes
  # (docs/RELEASE_NOTES_<version>.md if present, else the
  # auto-generated compare link). Operators reading the Releases
  # page get a quick install snippet for each surface inline.

  create-release:
    name: create unified GitHub Release
    needs: verify-version
    if: github.ref_type == 'tag' && (needs.verify-version.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            # 🏁 ISC MingoCAN ${{ github.ref_name }}

            Flash, monitor, and debug CAN messages on the team's STM32 ECUs — a desktop app plus optional editor and command-line tools, all at version ${{ github.ref_name }}.

            New here? You almost certainly want the **desktop app** below. 👇

            ## 💻 Desktop app — download & install

            Scroll to **Assets** at the bottom of this page and grab the file for your computer:

            | Your computer | Download the file ending in | How to install |
            |---|---|---|
            | **Windows 10 / 11** | `-setup.exe` | Double-click it. If a blue *"Windows protected your PC"* box appears → **More info → Run anyway**. |
            | **Mac** (Apple Silicon / M1–M4) | `.dmg` | Open it, drag the app to **Applications**. **First launch only:** right-click the app → **Open** → **Open**. |
            | **Ubuntu / Debian** | `.deb` | In a terminal from your Downloads folder: `sudo apt install ./*.deb` |
            | **Fedora / RHEL** | `.rpm` | `sudo dnf install ./*.rpm` |

            > ℹ️ **Why the warning?** The app isn't code-signed yet, so Windows and macOS show a one-time *"unidentified developer"* prompt. It's expected and safe — the steps above clear it. You only do this the first time you open the app.

            📖 First time setting up a CAN adapter (SLCAN / SocketCAN / PCAN / Vector)? See the **[setup guide](https://github.com/isc-fs/can-flasher/blob/${{ github.ref_name }}/docs/INSTALL.md)**.

            ## 🧩 VS Code extension (optional)

            Flash and discover devices without leaving your editor. Download the `.vsix` from **Assets**, then in VS Code: **Extensions panel → ⋯ menu → Install from VSIX…** — or run:
            ```bash
            code --install-extension vscode-stm32-can-*.vsix
            ```

            ## 🛠️ Command-line tool (advanced)

            `can-flasher` is the scriptable CLI. Install it from source at this version:
            ```bash
            cargo install --git https://github.com/isc-fs/can-flasher.git --tag ${{ github.ref_name }}
            ```

            ---

            <sub>Everything here ships together from one release. Full list of changes: [commit log for ${{ github.ref_name }}](https://github.com/isc-fs/can-flasher/commits/${{ github.ref_name }}).</sub>

  # ---- CLI binaries -------------------------------------------
  #
  # Same matrix shape as the pre-consolidation release.yml's
  # `build` job; one runner per target, native compile.

  cli-build:
    name: cli (${{ matrix.target }})
    needs: [verify-version, create-release]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: libudev-dev pkg-config
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            bin_ext: '.exe'
            apt_deps: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: libudev-dev pkg-config
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.apt_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: false
          rustflags: ''

      - name: Build release binary
        run: cargo build --release --bin can-flasher --target ${{ matrix.target }}

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          STAGE="can-flasher-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target }}/release/can-flasher${{ matrix.bin_ext }}" "$STAGE/"
          cp README.md "$STAGE/"
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          echo "archive=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "can-flasher-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/can-flasher${{ matrix.bin_ext }}" $stage
          Copy-Item README.md $stage
          if (Test-Path LICENSE) { Copy-Item LICENSE $stage }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          echo "archive=$stage.zip" >> $env:GITHUB_ENV

      # Human operators install the CLI via `cargo install --git …
      # --tag …`; the Release page leads with the installer packages
      # (.deb / .rpm / .dmg / .exe), not these raw tarballs. But the
      # VS Code extension downloads a version-matched `can-flasher`
      # binary on demand (see editor/vscode/src/cliManager.ts), so the
      # per-target archives ARE attached to the Release as well — named
      # `can-flasher-<tag>-<target>.{tar.gz,zip}` for the extension to
      # fetch. Still kept as workflow artifacts for debugging too.
      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.archive }}
          retention-days: 7

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive }}
          fail_on_unmatched_files: true

  # ---- VS Code extension --------------------------------------

  editor-build:
    name: editor vsix
    needs: [verify-version, create-release]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor/vscode
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile TypeScript
        run: npm run compile

      - name: Package .vsix
        id: package
        run: |
          npx --yes @vscode/vsce@^2.24.0 package --no-dependencies
          VSIX_NAME=$(ls vscode-stm32-can-*.vsix | head -n1)
          VERSION=$(node -p "require('./package.json').version")
          echo "vsix_path=editor/vscode/${VSIX_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          ls -lh "${VSIX_NAME}"

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: editor-vsix
          path: editor/vscode/vscode-stm32-can-*.vsix
          retention-days: 14

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: editor/vscode/vscode-stm32-can-*.vsix
          fail_on_unmatched_files: true

  # ---- ISC CAN Studio bundles ---------------------------------

  studio-build:
    name: studio (${{ matrix.os }})
    needs: [verify-version, create-release]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            apt_deps: >-
              libwebkit2gtk-4.1-dev
              libgtk-3-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              libudev-dev
              pkg-config
          - os: macos-latest
            apt_deps: ''
          - os: windows-latest
            apt_deps: ''
    defaults:
      run:
        working-directory: apps/can-studio
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit / GTK build deps
        if: matrix.apt_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
          rustflags: ''

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Generate icons (required for Windows .ico bundle)
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/icon.png

      # tauri-action does the heavy lifting: builds the Tauri app,
      # produces the per-platform bundles, and attaches them to the
      # existing Release (created by `create-release`). Setting
      # `tagName` makes it append to that release instead of
      # creating a sibling — single release page, all bundles.
      #
      # With `bundle.createUpdaterArtifacts: true` (tauri.conf.json) +
      # the TAURI_SIGNING_* env below, it also produces the signed
      # `.sig` updater bundles and generates + uploads `latest.json`
      # (the auto-update manifest the app polls). The two secrets MUST
      # exist before the first tag is cut, or this step fails — see
      # docs/UPDATES.md for the one-time keypair setup.
      - name: Build + attach to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/can-studio
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false

  # ---- Mirror MingoCAN to the iskApps "pit garage" ------------
  #
  # iskApps (isc-fs/iskapps) is the team's public download + auto-
  # update channel for all desktop apps (Wario Charger etc.). This
  # job re-hosts the Studio installers there as a `mingocan-vX.Y.Z`
  # release and commits `mingocan/latest.json` (the Tauri updater
  # manifest, with its `url`s rewritten to the iskApps assets — the
  # signatures are unchanged since the bundles are byte-identical).
  # The app's updater polls that manifest (see tauri.conf.json
  # endpoints); we also keep publishing to the can-flasher release so
  # already-installed builds with the old endpoint don't lose updates.
  #
  # Needs a cross-repo token: GITHUB_TOKEN can't write to iskApps.
  # Add `ISKAPPS_TOKEN` (a PAT or GitHub App token with `contents:
  # write` on isc-fs/iskapps) as a repo secret. When it's absent the
  # job no-ops (logs + exits 0) so the release still succeeds.
  publish-iskapps:
    name: mirror MingoCAN to iskApps
    needs: [create-release, studio-build]
    if: github.ref_type == 'tag' && needs.studio-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Re-host installers + publish manifest
        env:
          TAG: ${{ github.ref_name }}
          CF_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISKAPPS_TOKEN: ${{ secrets.ISKAPPS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ISKAPPS_TOKEN}" ]; then
            echo "::warning::ISKAPPS_TOKEN not set — skipping iskApps mirror. \
            Add a PAT/App token with contents:write on isc-fs/iskapps to enable."
            exit 0
          fi
          VERSION="${TAG#v}"
          APP_TAG="mingocan-${TAG}"

          # 1. Pull the Studio bundles + manifest the studio-build job
          #    just attached to the can-flasher release.
          mkdir -p dist && cd dist
          GH_TOKEN="${CF_TOKEN}" gh release download "${TAG}" \
            --repo isc-fs/can-flasher \
            --pattern 'ISC*' --pattern 'latest.json'
          ls -la

          # 2. Create (or update) the iskApps release and upload the
          #    installers + signed updater bundles (everything but the
          #    manifest, which lives in the repo tree).
          UPLOADS=$(ls | grep -v '^latest.json$')
          if GH_TOKEN="${ISKAPPS_TOKEN}" gh release view "${APP_TAG}" --repo isc-fs/iskapps >/dev/null 2>&1; then
            GH_TOKEN="${ISKAPPS_TOKEN}" gh release upload "${APP_TAG}" $UPLOADS --repo isc-fs/iskapps --clobber
          else
            GH_TOKEN="${ISKAPPS_TOKEN}" gh release create "${APP_TAG}" $UPLOADS \
              --repo isc-fs/iskapps \
              --title "ISC MingoCAN ${TAG}" \
              --notes "ISC MingoCAN ${VERSION} — flash, monitor, and debug CAN on the team's STM32 ECUs. Grab the installer for your platform below."
          fi

          # 3. Rewrite the manifest's URLs to the iskApps release
          #    (signatures stay — same bytes, just re-hosted) and
          #    commit it to iskApps `main` as mingocan/latest.json.
          BASE="https://github.com/isc-fs/iskapps/releases/download/${APP_TAG}/"
          jq --arg base "$BASE" \
            '.platforms |= map_values(.url = ($base + (.url | split("/") | last)))' \
            latest.json > latest.rewritten.json
          mv latest.rewritten.json latest.json
          cat latest.json

          cd ..
          git clone --depth 1 "https://x-access-token:${ISKAPPS_TOKEN}@github.com/isc-fs/iskapps.git" isk
          mkdir -p isk/mingocan
          cp dist/latest.json isk/mingocan/latest.json
          cd isk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- mingocan/latest.json; then
            echo "manifest unchanged — nothing to commit"
          else
            git add mingocan/latest.json
            git commit -m "mingocan: publish ${TAG}"
            git push origin HEAD:main
          fi

  # ---- Inline dev → main sync ---------------------------------
  #
  # Same logic as the pre-consolidation release.yml. Fast-forwards
  # `dev` onto `main` after the release lands, so the next branch
  # cut from dev starts on the tagged commit. Runs only when ALL
  # three build legs succeeded.
  #
  # Standalone `sync-dev-after-release.yml` is still kept as a
  # `workflow_dispatch` recovery handle for the rare case where
  # this inline job didn't run (e.g. manual publish from the UI).

  sync-dev:
    name: sync dev to main
    needs: [cli-build, editor-build, studio-build]
    if: github.ref_type == 'tag' && needs.cli-build.result == 'success' && needs.editor-build.result == 'success' && needs.studio-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Configure git as github-actions[bot]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main

      - name: Sync dev with main
        run: |
          set -e
          if git merge-base --is-ancestor HEAD origin/main; then
            git merge --ff-only origin/main
            echo "✓ fast-forwarded dev to origin/main"
          elif git merge-base --is-ancestor origin/main HEAD; then
            echo "✓ dev is already ahead of main — nothing to do"
            exit 0
          else
            echo "dev and main have diverged — creating a merge commit"
            git merge --no-edit origin/main
            echo "✓ merged main into dev"
          fi

      - name: Push dev
        run: git push origin dev
