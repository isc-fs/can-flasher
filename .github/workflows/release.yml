name: Release

# Unified release pipeline for **all three** product surfaces:
#
#   - `can-flasher` CLI (Rust binaries — Linux / macOS / Windows)
#   - VS Code extension (.vsix)
#   - ISC CAN Studio (Tauri desktop bundles — .dmg / .deb / .AppImage / .rpm / .msi / .exe)
#
# A single `v*` tag (e.g. `v2.0.0`) triggers all three surfaces to
# build in parallel and attach their artefacts to one GitHub
# Release. Per-surface tag namespaces (`editor-v*`, `can-studio-v*`)
# are retired — see `docs/CONTRIBUTING.md § Cutting a release`.
#
# Trigger semantics:
#
#   push tags: 'v*'    → tag push, attaches to GitHub Release
#   workflow_dispatch  → manual dry-run; artefacts only, no Release
#
# Why one workflow instead of three workflows attaching to one
# release: race conditions on concurrent release-create from
# multiple workflows are nasty (only one wins, the others
# silently skip files), and a single workflow makes "did the
# release succeed?" a single gate with three parallel legs.
#
# Versioning policy: every surface ships at the SAME version in
# lockstep. The `verify-version` gate enforces that all five
# source files (root Cargo.toml + editor/vscode/package.json +
# the three apps/can-studio version-of-truth files) agree with
# the pushed tag before any build runs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ---- Gate ---------------------------------------------------
  #
  # Every source-of-truth version file MUST agree with the pushed
  # tag. Catches the classic "tag v2.0.0 pushed but Cargo.toml
  # still reads 1.3.1" mistake before any artefact is produced.
  #
  # Skipped on manual dispatch (nothing to compare against).

  verify-version:
    name: verify tag matches all source versions
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions across all surfaces
        run: |
          set -eu
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          CLI_CARGO=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          EDITOR_PKG=$(node -p "require('./editor/vscode/package.json').version")
          STUDIO_CARGO=$(awk -F'"' '/^version/ {print $2; exit}' apps/can-studio/src-tauri/Cargo.toml)
          STUDIO_PKG=$(node -p "require('./apps/can-studio/package.json').version")
          STUDIO_TAURI=$(node -p "require('./apps/can-studio/src-tauri/tauri.conf.json').version")

          mismatches=""
          [[ "$TAG_VERSION" == "$CLI_CARGO"   ]] || mismatches+=" Cargo.toml=$CLI_CARGO"
          [[ "$TAG_VERSION" == "$EDITOR_PKG"  ]] || mismatches+=" editor/vscode/package.json=$EDITOR_PKG"
          [[ "$TAG_VERSION" == "$STUDIO_CARGO" ]] || mismatches+=" apps/can-studio/src-tauri/Cargo.toml=$STUDIO_CARGO"
          [[ "$TAG_VERSION" == "$STUDIO_PKG"  ]] || mismatches+=" apps/can-studio/package.json=$STUDIO_PKG"
          [[ "$TAG_VERSION" == "$STUDIO_TAURI" ]] || mismatches+=" apps/can-studio/src-tauri/tauri.conf.json=$STUDIO_TAURI"

          if [[ -n "$mismatches" ]]; then
            echo "::error::tag $GITHUB_REF_NAME implies version $TAG_VERSION, but source files disagree:$mismatches"
            echo "::error::Bump all five files to $TAG_VERSION in lockstep and retag (or delete the tag and re-cut)."
            exit 1
          fi
          echo "✓ all five source files agree on version $TAG_VERSION"

  # ---- Release page -------------------------------------------
  #
  # Creates the GitHub Release with the unified notes BEFORE any
  # build job attaches artefacts. Avoids the race condition that
  # would otherwise happen if three build jobs all tried to create
  # the same release from parallel runners.
  #
  # The body intentionally points at the in-repo release notes
  # (docs/RELEASE_NOTES_<version>.md if present, else the
  # auto-generated compare link). Operators reading the Releases
  # page get a quick install snippet for each surface inline.

  create-release:
    name: create unified GitHub Release
    needs: verify-version
    if: github.ref_type == 'tag' && (needs.verify-version.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            **Unified release** — `can-flasher` CLI + ISC STM32 CAN Flasher (VS Code extension) + ISC CAN Studio (desktop app) all ship together at the same version from a single tag.

            ### Install / upgrade per surface

            **CLI (`can-flasher`)** — pre-built binaries below for Linux x86_64 / aarch64, macOS aarch64, Windows x86_64.
            ```bash
            cargo install --git https://github.com/isc-fs/can-flasher.git --tag ${{ github.ref_name }}
            ```

            **VS Code extension** — download `vscode-stm32-can-*.vsix` from the assets below, then in VS Code: **Extensions panel → ⋯ menu → Install from VSIX…**
            ```bash
            code --install-extension vscode-stm32-can-*.vsix
            ```

            **ISC CAN Studio** — pick the bundle for your OS:
            - macOS: `.dmg` (ad-hoc signed; first launch needs **right-click → Open → confirm**)
            - Linux: `.deb`, `.AppImage`, or `.rpm`
            - Windows: `.msi` (preferred) or `.exe` installer

            See [docs/INSTALL.md](https://github.com/isc-fs/can-flasher/blob/${{ github.ref_name }}/docs/INSTALL.md) for per-OS adapter setup (SLCAN / SocketCAN / PCAN / Vector).

            ---

            **Full commit log**: https://github.com/isc-fs/can-flasher/commits/${{ github.ref_name }}

  # ---- CLI binaries -------------------------------------------
  #
  # Same matrix shape as the pre-consolidation release.yml's
  # `build` job; one runner per target, native compile.

  cli-build:
    name: cli (${{ matrix.target }})
    needs: [verify-version, create-release]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: libudev-dev pkg-config
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            bin_ext: '.exe'
            apt_deps: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: libudev-dev pkg-config
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.apt_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: false
          rustflags: ''

      - name: Build release binary
        run: cargo build --release --bin can-flasher --target ${{ matrix.target }}

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          STAGE="can-flasher-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target }}/release/can-flasher${{ matrix.bin_ext }}" "$STAGE/"
          cp README.md "$STAGE/"
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          echo "archive=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "can-flasher-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/can-flasher${{ matrix.bin_ext }}" $stage
          Copy-Item README.md $stage
          if (Test-Path LICENSE) { Copy-Item LICENSE $stage }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          echo "archive=$stage.zip" >> $env:GITHUB_ENV

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.archive }}
          retention-days: 7

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive }}
          fail_on_unmatched_files: true

  # ---- VS Code extension --------------------------------------

  editor-build:
    name: editor vsix
    needs: [verify-version, create-release]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor/vscode
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile TypeScript
        run: npm run compile

      - name: Package .vsix
        id: package
        run: |
          npx --yes @vscode/vsce@^2.24.0 package --no-dependencies
          VSIX_NAME=$(ls vscode-stm32-can-*.vsix | head -n1)
          VERSION=$(node -p "require('./package.json').version")
          echo "vsix_path=editor/vscode/${VSIX_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          ls -lh "${VSIX_NAME}"

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: editor-vsix
          path: editor/vscode/vscode-stm32-can-*.vsix
          retention-days: 14

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: editor/vscode/vscode-stm32-can-*.vsix
          fail_on_unmatched_files: true

  # ---- ISC CAN Studio bundles ---------------------------------

  studio-build:
    name: studio (${{ matrix.os }})
    needs: [verify-version, create-release]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            apt_deps: >-
              libwebkit2gtk-4.1-dev
              libgtk-3-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              libudev-dev
              pkg-config
          - os: macos-latest
            apt_deps: ''
          - os: windows-latest
            apt_deps: ''
    defaults:
      run:
        working-directory: apps/can-studio
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit / GTK build deps
        if: matrix.apt_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
          rustflags: ''

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Generate icons (required for Windows .ico bundle)
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/icon.png

      # tauri-action does the heavy lifting: builds the Tauri app,
      # produces the per-platform bundles, and attaches them to the
      # existing Release (created by `create-release`). Setting
      # `tagName` makes it append to that release instead of
      # creating a sibling — single release page, all bundles.
      - name: Build + attach to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/can-studio
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false

  # ---- Inline dev → main sync ---------------------------------
  #
  # Same logic as the pre-consolidation release.yml. Fast-forwards
  # `dev` onto `main` after the release lands, so the next branch
  # cut from dev starts on the tagged commit. Runs only when ALL
  # three build legs succeeded.
  #
  # Standalone `sync-dev-after-release.yml` is still kept as a
  # `workflow_dispatch` recovery handle for the rare case where
  # this inline job didn't run (e.g. manual publish from the UI).

  sync-dev:
    name: sync dev to main
    needs: [cli-build, editor-build, studio-build]
    if: github.ref_type == 'tag' && needs.cli-build.result == 'success' && needs.editor-build.result == 'success' && needs.studio-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Configure git as github-actions[bot]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main

      - name: Sync dev with main
        run: |
          set -e
          if git merge-base --is-ancestor HEAD origin/main; then
            git merge --ff-only origin/main
            echo "✓ fast-forwarded dev to origin/main"
          elif git merge-base --is-ancestor origin/main HEAD; then
            echo "✓ dev is already ahead of main — nothing to do"
            exit 0
          else
            echo "dev and main have diverged — creating a merge commit"
            git merge --no-edit origin/main
            echo "✓ merged main into dev"
          fi

      - name: Push dev
        run: git push origin dev
