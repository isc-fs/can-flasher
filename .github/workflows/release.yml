name: Release

# Cross-platform binary builds for `can-flasher`. Triggers on any
# `v*` tag push, plus manual runs via the UI when we need to
# rebuild without cutting a new tag (e.g. re-uploading after an
# artifact got clobbered). Each job compiles natively on its host
# runner — no cross-compile toolchains to babysit — and the
# artifacts land on the GitHub Release the tag created (or, for
# manual runs, just stay as workflow artifacts so we can inspect
# before promoting).
#
# CI correctness lives in ci.yml (fmt / clippy / test). This
# workflow is strictly about producing and publishing binaries.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate that prevents the classic "tag v1.1.1 got pushed but Cargo.toml
  # still reads 1.1.0" mistake. v1.1.0 itself shipped with this bug —
  # binaries reported `can-flasher 0.1.0` on --version because no one
  # bumped Cargo.toml before tagging. We caught it by eye; next time
  # we want CI to catch it for us, before any build runs.
  #
  # Only runs on actual tag pushes — manual `workflow_dispatch` runs
  # have nothing to compare against and skip this gate entirely (the
  # `build` job below uses `if: always()` to treat a skip as a pass).
  verify-version:
    name: verify tag matches Cargo.toml
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::tag=${GITHUB_REF_NAME} implies version=${TAG_VERSION}, but Cargo.toml reads ${CARGO_VERSION}. Bump Cargo.toml to ${TAG_VERSION} and retag (or delete the tag and re-cut after bumping)."
            exit 1
          fi
          echo "✓ version ${CARGO_VERSION} matches tag ${GITHUB_REF_NAME}"

  build:
    name: build (${{ matrix.target }})
    needs: verify-version
    # `if: always()` lets this job run even when `verify-version` was
    # skipped (manual runs). A tag-push where verify-version FAILED
    # propagates through `needs` and skips this job — which is what
    # we want.
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: libudev-dev pkg-config
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            bin_ext: '.exe'
            apt_deps: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
            bin_ext: ''
            apt_deps: libudev-dev pkg-config
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.apt_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin can-flasher --target ${{ matrix.target }}

      # Derive the version string from the tag (`refs/tags/v1.1.0` →
      # `v1.1.0`) or use a `dev-<sha>` placeholder for manual runs.
      # The placeholder keeps artifact names stable-ish while clearly
      # signalling "not an official release."
      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # Pack the binary plus README + LICENCE hints into a single
      # archive per target. Flat layout — the archive extracts to a
      # single directory named after the archive. Operators get one
      # curl/wget + extract to a clean copy of `can-flasher` on their
      # PATH.
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          STAGE="can-flasher-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target }}/release/can-flasher${{ matrix.bin_ext }}" "$STAGE/"
          cp README.md "$STAGE/"
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          echo "archive=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "can-flasher-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/can-flasher${{ matrix.bin_ext }}" $stage
          Copy-Item README.md $stage
          if (Test-Path LICENSE) { Copy-Item LICENSE $stage }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          echo "archive=$stage.zip" >> $env:GITHUB_ENV

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: can-flasher-${{ matrix.target }}
          path: ${{ env.archive }}
          # Keep manual-run artifacts for a week — enough for a
          # hotfix loop, short enough that we don't hoard storage.
          retention-days: 7

      - name: Attach to GitHub Release
        # Only attach when triggered by a tag push — manual runs
        # stay as workflow artifacts so a half-built release
        # doesn't accidentally publish.
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive }}
          fail_on_unmatched_files: true
