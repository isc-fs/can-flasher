name: CI

# Runs fmt + clippy + build + test on every push that touches Rust
# sources, Cargo metadata, or the workflow itself. Docs-only changes
# skip CI so README / REQUIREMENTS.md tweaks don't burn runner minutes.
#
# Cross-platform binary builds for releases live in release.yml
# (triggers on `v*` tag push + manual dispatch). CI here is a
# correctness gate — native build on each supported host OS.

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [dev, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          cache: false
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          cache: false
      - uses: Swatinem/rust-cache@v2
      # `serialport` pulls in `libudev-sys` on Linux for USB port
      # enumeration (the CANable / CANtact VID-PID filter in
      # transport::slcan::detect). Ubuntu runners ship without the
      # -dev header / pkg-config file, so cargo build fails out of
      # the box. Installing it up front keeps CI green and matches
      # the "no root at runtime" promise from REQUIREMENTS.md — the
      # shared library (`libudev1`) is already present on every
      # modern Ubuntu; this only adds the development headers.
      - name: Install libudev-dev (Linux only)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - uses: Swatinem/rust-cache@v2
      # See comment in the clippy job — `serialport` needs libudev on
      # Linux for USB enumeration.
      - name: Install libudev-dev (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - run: cargo build --verbose
      - run: cargo test --verbose
